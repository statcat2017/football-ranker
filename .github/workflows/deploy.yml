name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: appuser
          SOURCE: "deploy/"
          TARGET: ${{ secrets.DEPLOY_PATH }}
          EXCLUDE: "data/*.sqlite, data/*.sqlite-shm, data/*.sqlite-wal"
          ARGS: "-rlgoDzvc -i"

      - name: Restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: appuser
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            set -a
            . /etc/football-ranker.env
            set +a
            echo "SQLITE_DB_PATH from env: $SQLITE_DB_PATH"
            echo "DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}"
            sudo systemctl restart football-ranker

      - name: Import players
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: appuser
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /tmp
            rm -rf football-ranker-import
            git clone --depth 1 https://github.com/${{ github.repository }}.git football-ranker-import
            cd football-ranker-import
            set -a
            . /etc/football-ranker.env
            set +a
            echo "=== ENV DEBUG ==="
            echo "SQLITE_DB_PATH=$SQLITE_DB_PATH"
            echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}"
            echo "CWD=$(pwd)"
            echo "DB dirname exists: $(ls -la $(dirname "${SQLITE_DB_PATH:-./data/football-ranker.sqlite}") 2>&1)"
            echo "=== END ENV DEBUG ==="
            export FOOTBALL_DATA_API_TOKEN=${{ secrets.FOOTBALL_DATA_API_TOKEN }}
            export SQLITE_DB_PATH=${{ secrets.DEPLOY_PATH }}/data/football-ranker.sqlite
            mkdir -p $(dirname "$SQLITE_DB_PATH")
            npm ci --ignore-scripts 2>/dev/null
            npx tsx scripts/import-players.ts
            echo "=== POST IMPORT ==="
            echo "DB path: $SQLITE_DB_PATH"
            echo "DB size: $(ls -la "$SQLITE_DB_PATH" 2>&1)"
            cd /tmp
            rm -rf football-ranker-import

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: appuser
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -a
            . /etc/football-ranker.env
            set +a
            PORT="${PORT:-3001}"
            HEALTHCHECK_URL="http://localhost:${PORT}/api/health"
            for i in {1..30}; do
              if curl -fsS --max-time 5 "$HEALTHCHECK_URL" > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after 60s"
            sudo journalctl -u football-ranker -n 100 --no-pager
            exit 1
